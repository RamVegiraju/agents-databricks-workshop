bundle:
  name: hello_world_agent

resources:
  apps:
    hello_world_agent:
      name: "agent-hello-world"
      description: "Hello-world agent with MCP tools and Lakebase memory"
      source_code_path: ./
      resources:
        - name: "database"
          database:
            instance_name: "agent-memory"
            database_name: "databricks_postgres"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT  # Set to your Databricks CLI profile name
