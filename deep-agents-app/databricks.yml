bundle:
  name: deep_agents_app

resources:
  apps:
    deep_agents_app:
      name: "agent-research-assistant"
      description: "Research assistant with deep-agents, subagents, and Lakebase memory"
      source_code_path: ./
      resources:
        - name: "database"
          database:
            instance_name: "agent-memory"
            database_name: "databricks_postgres"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT  # Set to your Databricks CLI profile name
