bundle:
  name: deep_agents_app

resources:
  apps:
    deep_agents_app:
      name: "agent-research-assistant"
      description: "Research assistant with deep-agents, subagents, and Lakebase memory"
      source_code_path: ./
      resources:
        - name: "database"
          database:
            instance_name: "<your-lakebase-instance-name>"
            database_name: "postgres"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
