command: ["uv", "run", "streamlit", "run", "streamlit_app.py", "--server.port", "8000", "--server.address", "0.0.0.0"]

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MCP_SERVER_URL
    value: "<your-mcp-server-url>/mcp"
  - name: LAKEBASE_INSTANCE_NAME
    value: "<your-lakebase-instance-name>"
  - name: EMBEDDING_ENDPOINT
    value: "databricks-gte-large-en"
  - name: EMBEDDING_DIMS
    value: "1024"
